<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel & Shopping Dashboard</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1><i class="fas fa-globe-americas"></i> Travel & Shopping Dashboard</h1>
            <p class="subtitle">Мониторинг цен на авиабилеты и товары с eBay</p>
        </header>

        <div class="controls">
            <button id="addFlightBtn" class="btn btn-primary">
                <i class="fas fa-plane"></i> Добавить виджет авиабилетов
            </button>
            <button id="addEbayBtn" class="btn btn-primary">
                <i class="fab fa-ebay"></i> Добавить виджет eBay
            </button>
            <button id="addTodoBtn" class="btn btn-secondary">
                <i class="fas fa-tasks"></i> Добавить To-Do лист
            </button>
            <button id="addQuoteBtn" class="btn btn-secondary">
                <i class="fas fa-quote-right"></i> Добавить цитату дня
            </button>
        </div>

        <div id="widgetsGrid" class="widgets-grid">
            <!-- Виджеты будут добавляться сюда динамически -->
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
